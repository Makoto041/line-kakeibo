name: Claude Code Full Automation

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    # APIキーが未設定の場合はスキップ
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code Generate + PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: |
            mcp__github__create_pull_request
            mcp__github__create_file
            mcp__github__update_file
          prompt: |
            You are Claude Code, the AI developer for the "line-kakeibo" project.
            - Analyze the current repository.
            - Implement the next small improvement or bugfix relevant to household expense tracking.
            - Follow the project's style, naming, and TypeScript conventions.
            - Commit changes to a new branch and open a pull request targeting `master`.

  review-and-issues:
    needs: generate-and-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: |
            mcp__github__comment_on_pr
            mcp__github__create_issue
          prompt: |
            Review the pull request just opened.
            - Perform static analysis of the diff.
            - Point out code smells, performance issues, and security risks.
            - If any problems require manual fixing, create a new GitHub Issue summarizing them.
            - Use concise, actionable language in Japanese.
