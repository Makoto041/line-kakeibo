name: Improved CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 手動実行を可能に

env:
  NODE_VERSION: '20'

# 同時実行の制御
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 変更検知ジョブ
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      bot: ${{ steps.filter.outputs.bot }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/**'
            bot:
              - 'bot/**'
              - '.github/workflows/**'
            deps:
              - 'package*.json'
              - 'package-lock.json'
              - '**/package*.json'

  # 依存関係のインストールとキャッシング
  install-deps:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'pull_request' || 
      needs.changes.outputs.web == 'true' || 
      needs.changes.outputs.bot == 'true' ||
      needs.changes.outputs.deps == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          

      - name: Install dependencies
        run: |
          npm ci
          
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web/node_modules
            bot/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

  # Linting & Type Checking
  lint:
    runs-on: ubuntu-latest
    needs: [install-deps, changes]
    if: |
      github.event_name == 'pull_request' || 
      needs.changes.outputs.web == 'true' || 
      needs.changes.outputs.bot == 'true'
    strategy:
      matrix:
        app: [web, bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web/node_modules
            bot/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          
      - name: Run ESLint
        working-directory: ./${{ matrix.app }}
        run: |
          npm run lint --if-present || echo "::warning::Lint completed with warnings/errors"
          
      - name: Run TypeScript check
        working-directory: ./${{ matrix.app }}
        run: |
          npx tsc --noEmit || echo "::warning::TypeScript check completed with errors"

  # ビルドとテスト
  build-and-test:
    runs-on: ubuntu-latest
    needs: [install-deps, changes]
    if: |
      github.event_name == 'pull_request' || 
      needs.changes.outputs.web == 'true' || 
      needs.changes.outputs.bot == 'true'
    strategy:
      matrix:
        app: [web, bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web/node_modules
            bot/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          
      - name: Build ${{ matrix.app }}
        working-directory: ./${{ matrix.app }}
        run: npm run build
        
      - name: Run tests
        working-directory: ./${{ matrix.app }}
        run: |
          npm test --if-present || echo "::notice::No tests configured for ${{ matrix.app }}"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-build
          path: |
            ${{ matrix.app }}/dist
            ${{ matrix.app }}/.next
          retention-days: 1

  # セキュリティチェック（並列実行）
  security:
    runs-on: ubuntu-latest
    needs: install-deps
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            web/node_modules
            bot/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Run audit
        run: |
          npm audit --audit-level=moderate || echo "::warning::Security vulnerabilities found"

      - name: Run secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --max-depth 1
        # Note: continue-on-error removed - verified secret leaks must fail the build

      # CodeQL requires init before analyze
      - name: Initialize CodeQL
        id: init-codeql
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        if: steps.init-codeql.outcome == 'success'
        uses: github/codeql-action/analyze@v3

  # Webアプリデプロイ（Vercel）
  deploy-web:
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, changes]
    if: |
      github.ref == 'refs/heads/master' && 
      github.event_name == 'push' &&
      needs.changes.outputs.web == 'true'
    environment:
      name: production-web
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: web-build
          path: web/
          
      - name: Deploy to Vercel
        id: deploy
        run: |
          npm install -g vercel@latest
          cd web
          vercel pull --environment=production --token="${{ secrets.VERCEL_TOKEN }}" --yes --project line-kakeibo
          DEPLOYMENT_URL=$(vercel --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes --project line-kakeibo)
          echo "url=${DEPLOYMENT_URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${DEPLOYMENT_URL}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Comment deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Web app deployed to: ${{ steps.deploy.outputs.url }}'
            })

  # Bot/Functions デプロイ（Firebase）
  deploy-bot:
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, changes]
    if: |
      github.ref == 'refs/heads/master' && 
      github.event_name == 'push' &&
      needs.changes.outputs.bot == 'true'
    environment:
      name: production-bot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: bot-build
          path: bot/
          
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools@latest
          firebase deploy --only functions,firestore:rules,firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

  # デプロイ後の健全性チェック
  post-deploy-check:
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-bot]
    if: always() && (needs.deploy-web.result == 'success' || needs.deploy-bot.result == 'success')
    steps:
      - name: Health check - Web
        if: needs.deploy-web.result == 'success'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://your-app.vercel.app/api/health)
          if [ $response -eq 200 ]; then
            echo "✅ Web app is healthy"
          else
            echo "❌ Web app health check failed"
            exit 1
          fi
          
      - name: Health check - Bot
        if: needs.deploy-bot.result == 'success'
        run: |
          # Firebase Functions health check
          response=$(curl -s -o /dev/null -w "%{http_code}" https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/health)
          if [ $response -eq 200 ]; then
            echo "✅ Bot functions are healthy"
          else
            echo "❌ Bot health check failed"
            exit 1
          fi
          
      - name: Send notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment Status:
            - Web: ${{ needs.deploy-web.result }}
            - Bot: ${{ needs.deploy-bot.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # リリースノート生成（オプション）
  release-notes:
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-bot]
    if: |
      github.ref == 'refs/heads/master' && 
      github.event_name == 'push' &&
      (needs.deploy-web.result == 'success' || needs.deploy-bot.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Generate release notes
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
