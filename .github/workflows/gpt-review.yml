name: ChatGPT Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  chatgpt-review:
    runs-on: ubuntu-latest
    # APIキーが未設定の場合はスキップ
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install openai@latest @octokit/rest

      - name: Run ChatGPT Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node .github/scripts/gpt-review.js

      - name: Update PR with review status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const prNumber = ${{ github.event.pull_request.number || inputs.pr_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `${emoji} ChatGPT Code Review ${status === 'success' ? 'completed successfully' : 'encountered an error'}`
            });
